{# Только карточки + триггер следующей страницы #}
{% for item in items %}
    {% include "content/_card.html" %}
{% endfor %}

{% if page_obj.has_next %}
    <!-- Полноширинный контейнер для триггера -->
    <div class="infinite-scroll-fullwidth">
        <div class="infinite-scroll-trigger"
             hx-get="?page={{ page_obj.next_page_number }}"
             hx-trigger="intersect once"
             hx-swap="beforeend"
             hx-target="#cards-grid"
             hx-indicator="#loading-indicator"
             aria-hidden="true">
        </div>
    </div>
{% endif %}
