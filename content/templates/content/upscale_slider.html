{% load static %}

<div class="comparison-slider">
    <img src="{{ photos.0.photo.url }}" class="before-img" alt="До">
    <img src="{{ photos.1.photo.url|default:photos.0.photo.url }}" class="after-img" alt="После">
    
    <div class="divider">
        <div class="handle">⇆</div>
    </div>
</div>

<style>
.comparison-slider {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.comparison-slider img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.before-img { z-index: 2; }
.after-img  { z-index: 1; }

.divider {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: #ffffff;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    cursor: ew-resize;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
}

.handle {
    width: 42px;
    height: 42px;
    background: #111;
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: 3px solid white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.comparison-slider').forEach(slider => {
        const divider = slider.querySelector('.divider');
        const before = slider.querySelector('.before-img');
        let isDragging = false;

        function move(clientX) {
            const rect = slider.getBoundingClientRect();
            let percent = ((clientX - rect.left) / rect.width) * 100;
            percent = Math.max(5, Math.min(95, percent));
            divider.style.left = percent + '%';
            before.style.clipPath = `polygon(0 0, ${percent}% 0, ${percent}% 100%, 0 100%)`;
        }

        divider.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', e => isDragging && move(e.clientX));

        divider.addEventListener('touchstart', () => isDragging = true);
        document.addEventListener('touchend', () => isDragging = false);
        document.addEventListener('touchmove', e => isDragging && move(e.touches[0].clientX));

        // Начальная позиция 50%
        setTimeout(() => move(slider.getBoundingClientRect().left + slider.offsetWidth / 2), 100);
    });
});
</script>
