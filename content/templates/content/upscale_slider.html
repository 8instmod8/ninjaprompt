{% load static %}
{% if photos|length >= 2 %}
<div class="comparison-slider">
    <img src="{{ photos.0.photo.url }}" class="before-img" alt="До">
    <img src="{{ photos.1.photo.url|default:photos.0.photo.url }}" class="after-img" alt="После">
    
    <div class="divider">
        <div class="handle">⇆</div>
    </div>
</div>
{% endif %}
